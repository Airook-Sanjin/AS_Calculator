<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="icon" type="image/x-icon" href="/Asset/calculator-outline.svg">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <div class="header">
                <h1>Calculator</h1>
                <button class="light-dark" type="button">Light Mode</button>
            </div>

            <div class="screen">
                <div id='split'></div>
                <p id ="number"></p>
            </div>

            <div class="buttons">
                
                <div class="rows">
                    <!-- <button id ="sqr">x<sup>2</sup></button> -->
                    <!-- <button id = "radic">√x</button> -->
                    <button class="functions operator"id = "clear">AC</button>
                    <button class="functions"id = "para">( )</button>
                    <button class="functions"id ="percent">%</button>
                    
                    <button class="operator" id = "divide">/</button>
                </div>
                <div class="rows">
                    <button class="number"id ="seven">7</button>
                    <button class="number"id = "eight">8</button>
                    <button class="number"id = "nine">9</button>
                    <button class="operator" id ="multiply">x</button>
                </div>
                <div class="rows">
                    <button class="number"id ="four">4</button>
                    <button class="number"id ="five">5</button>
                    <button class="number"id="six">6</button>
                    <button class="operator" id="minus">-</button>
                </div>
                <div class="rows">
                    <button class="number"id ="one">1</button>
                    <button class="number"id = "two">2</button>
                    <button class="number"id ="three">3</button>
                    <button class="operator" id="plus">+</button>
                </div>
                <div class="rows">
                    <button id="dot">.</button>
                    <button class="number"id ="zero">0</button>
                    <button class="functions"id = "delete">C</button>
                    <button class="operator" id ="equal">=</button>
                </div>
            </div>
        </div>

        <script src="CalcJS.js"></script>
    </body>
</html>
